<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeLog</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:-apple-system;}
.header{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #222;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;}
.btn{background:#111;padding:10px;text-align:center;border-radius:10px;}
.item{padding:10px;border-bottom:1px solid #222;}
input,textarea{width:100%;margin-top:5px;background:#111;color:#fff;}
canvas{max-width:300px;margin:10px auto;display:block;}
</style>
</head>

<body>

<div class="header">
<span id="dateLabel"></span>
<div>
<button onclick="prevDay()">◀</button>
<button onclick="nextDay()">▶</button>
<button onclick="share()">共有</button>
<button onclick="chart()">📊</button>
</div>
</div>

<div class="grid" id="buttons"></div>
<div id="list"></div>
<canvas id="chartCanvas" width="300" height="300"></canvas>

<script>

// ▼データ
let logs=JSON.parse(localStorage.getItem("logs")||"[]");
let cats=[{name:"仕事",icon:"💼"},{name:"食事",icon:"🍽️"}];
let current=new Date();

// ▼保存
function save(){localStorage.setItem("logs",JSON.stringify(logs));}

// ▼日付
function dstr(d){return d.toISOString().slice(0,10);}

// ▼時間
function dur(s,e){
 if(!e)return "";
 let m=Math.ceil((new Date(e)-new Date(s))/60000);
 let h=Math.floor(m/60),mm=m%60;
 return h?`（${h}時間${mm}分）`:`（${mm}分）`;
}

// ▼ログ
function start(c){
 logs.unshift({id:Date.now(),title:c.name,icon:c.icon,start:new Date().toISOString(),end:null,memo:"",img:""});
 save();render();
}
function end(id){
 let l=logs.find(x=>x.id===id);
 l.end=new Date().toISOString();
 save();render();
}

// ▼時間編集（修正）
function edit(id){
 let l=logs.find(x=>x.id===id);

 let s=prompt("開始 YYYY-MM-DDTHH:MM",l.start);
 let e=prompt("終了 YYYY-MM-DDTHH:MM",l.end||"");

 if(!s||!e)return;

 if(new Date(e)<new Date(s)){
  alert("時間逆転");
  return;
 }

 l.start=s;
 l.end=e;
 save();render();
}

// ▼日付
function prevDay(){current.setDate(current.getDate()-1);render();}
function nextDay(){current.setDate(current.getDate()+1);render();}

// ▼共有（確実動作）
function share(){
 let txt=dstr(current)+"のログ\n\n";
 logs.filter(l=>l.start.slice(0,10)===dstr(current)).forEach(l=>{
  txt+=`${l.icon} ${l.title}\n${dur(l.start,l.end)}\n${l.memo||""}\n\n`;
 });

 navigator.clipboard.writeText(txt)
 .then(()=>alert("コピーしました"))
 .catch(()=>prompt("コピーしてください",txt));
}

// ▼画像（修正）
function imgUpload(id,input){
 let f=input.files[0];
 if(!f)return;
 let r=new FileReader();
 r.onload=e=>{
  let l=logs.find(x=>x.id===id);
  l.img=e.target.result;
  save();render();
 };
 r.readAsDataURL(f);
}

// ▼グラフ（修正）
function chart(){
 let ctx=chartCanvas.getContext("2d");
 ctx.clearRect(0,0,300,300);

 let map={};
 logs.filter(l=>l.end && l.start.slice(0,10)===dstr(current)).forEach(l=>{
  let m=Math.ceil((new Date(l.end)-new Date(l.start))/60000);
  map[l.title]=(map[l.title]||0)+m;
 });

 let total=Object.values(map).reduce((a,b)=>a+b,0);
 if(!total)return;

 let start=0;
 Object.keys(map).forEach(k=>{
  let val=map[k]/total*2*Math.PI;
  ctx.beginPath();
  ctx.moveTo(150,150);
  ctx.arc(150,150,100,start,start+val);
  ctx.fillStyle="#"+Math.floor(Math.random()*16777215).toString(16);
  ctx.fill();
  start+=val;
 });
}

// ▼描画
function render(){
 dateLabel.innerText=dstr(current);

 buttons.innerHTML="";
 cats.forEach(c=>{
  let el=document.createElement("div");
  el.className="btn";
  el.innerHTML=`${c.icon}<br>${c.name}`;
  el.onclick=()=>start(c);
  buttons.appendChild(el);
 });

 list.innerHTML="";
 logs.filter(l=>l.start.slice(0,10)===dstr(current)).forEach(l=>{
  let el=document.createElement("div");
  el.className="item";

  el.innerHTML=`
   ${l.icon} ${l.title}<br>
   ${dur(l.start,l.end)}
   <br><button onclick="end(${l.id})">終了</button>
   <button onclick="edit(${l.id})">時間編集</button>
   <textarea onchange="memo(${l.id},this.value)">${l.memo||""}</textarea>
   <input type="file" accept="image/*" onchange="imgUpload(${l.id},this)">
   ${l.img?`<img src="${l.img}" width="100%">`:""}
  `;

  list.appendChild(el);
 });
}

function memo(id,val){
 let l=logs.find(x=>x.id===id);
 l.memo=val;
 save();
}

render();

</script>
</body>
</html>
