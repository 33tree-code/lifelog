<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeLog</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:-apple-system;}
.header{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #222;}
.btn{padding:10px;margin:5px;background:#111;border-radius:8px;}
.item{border-bottom:1px solid #333;padding:10px;}
input,textarea{width:100%;margin-top:5px;background:#111;color:#fff;border:1px solid #333;}
img.icon{width:20px;height:20px;vertical-align:middle;}
</style>
</head>

<body>

<div class="header">
  <span id="dateLabel"></span>
  <div>
    <button onclick="prevDay()">◀</button>
    <button onclick="nextDay()">▶</button>
    <button onclick="share()">共有</button>
  </div>
</div>

<div id="buttons"></div>

<div style="padding:10px;">
  <button onclick="addCategory()">＋カテゴリ追加</button>
</div>

<div id="list"></div>

<script>

let logs = JSON.parse(localStorage.getItem("logs") || "[]");
let cats = JSON.parse(localStorage.getItem("cats") || '[{"name":"仕事","icon":"💼"},{"name":"食事","icon":"🍽️"}]');
let currentDate = new Date();

function save(){
  localStorage.setItem("logs", JSON.stringify(logs));
  localStorage.setItem("cats", JSON.stringify(cats));
}

function formatHM(date){
  let d=new Date(date);
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function dateKey(d){
  return new Date(d).toISOString().slice(0,10);
}

function duration(s,e){
  if(!e)return "";
  let m=Math.ceil((new Date(e)-new Date(s))/60000);
  let h=Math.floor(m/60);
  let mm=m%60;
  return h?`${h}時間${mm}分`:`${mm}分`;
}

function iconHTML(icon){
  if(icon && icon.startsWith("http")){
    return `<img src="${icon}" class="icon">`;
  }
  return icon||"";
}

// ▼ログ
function startLog(c){
  logs.unshift({id:Date.now(),title:c.name,icon:c.icon,start:new Date().toISOString(),end:null,memo:"",img:""});
  save(); render();
}

function endLog(id){
  let l=logs.find(x=>x.id===id);
  l.end=new Date().toISOString();
  save(); render();
}

function deleteLog(id){
  logs = logs.filter(x=>x.id!==id);
  save(); render();
}

// ▼時間変更（安定版）
function editTime(id){
  let l=logs.find(x=>x.id===id);

  let s=prompt("開始（例 2026-05-02T20:00）", l.start);
  let e=prompt("終了（例 2026-05-02T21:00）", l.end||"");

  if(!s||!e)return;
  if(new Date(e)<new Date(s)){
    alert("時間が逆です");
    return;
  }

  l.start=s;
  l.end=e;
  save(); render();
}

// ▼カテゴリ
function addCategory(){
  let name=prompt("カテゴリ名");
  let icon=prompt("アイコン（絵文字 or 画像URL）");
  if(!name)return;
  cats.push({name,icon});
  save(); render();
}

function deleteCategory(index){
  if(!confirm("削除する？"))return;
  cats.splice(index,1);
  save(); render();
}

// ▼画像
function uploadImg(id,input){
  let file=input.files[0];
  if(!file)return;

  let reader=new FileReader();
  reader.onload=e=>{
    let l=logs.find(x=>x.id===id);
    l.img=e.target.result;
    save(); render();
  };
  reader.readAsDataURL(file);
}

// ▼メモ
function saveMemo(id,val){
  let l=logs.find(x=>x.id===id);
  l.memo=val;
  save();
}

// ▼日付
function prevDay(){currentDate.setDate(currentDate.getDate()-1);render();}
function nextDay(){currentDate.setDate(currentDate.getDate()+1);render();}

// ▼共有（Evernote対応）
function share(){
  let text="ログ\n\n";

  logs.filter(l=>dateKey(l.start)===dateKey(currentDate))
  .forEach(l=>{
    text+=`${l.title}\n`;
    text+=`${formatHM(l.start)}～${l.end?formatHM(l.end):""}\n`;
    text+=`${l.end?"（"+duration(l.start,l.end)+"）":""}\n`;
    text+=`${l.memo||""}\n`;

    if(l.img){
      text+=`${l.img}\n`;
    }

    text+="\n";
  });

  if(navigator.share){
    navigator.share({text});
  }else{
    prompt("コピー",text);
  }
}

// ▼描画
function render(){
  document.getElementById("dateLabel").innerText = currentDate.toISOString().slice(0,10);

  // カテゴリ
  let btns=document.getElementById("buttons");
  btns.innerHTML="";
  cats.forEach((c,i)=>{
    let b=document.createElement("div");
    b.className="btn";
    b.innerHTML=`${iconHTML(c.icon)} ${c.name}<br><button onclick="deleteCategory(${i})">削除</button>`;
    b.onclick=()=>startLog(c);
    btns.appendChild(b);
  });

  // ログ
  let list=document.getElementById("list");
  list.innerHTML="";

  logs.filter(l=>dateKey(l.start)===dateKey(currentDate))
  .forEach(l=>{
    let el=document.createElement("div");
    el.className="item";

    el.innerHTML=`
      ${iconHTML(l.icon)} ${l.title}<br>
      ${formatHM(l.start)}～${l.end?formatHM(l.end):""}
      ${l.end?`（${duration(l.start,l.end)}）`:""}
      <br>
      <button onclick="endLog(${l.id})">終了</button>
      <button onclick="editTime(${l.id})">時間変更</button>
      <button onclick="deleteLog(${l.id})">削除</button>
      <textarea onchange="saveMemo(${l.id},this.value)" placeholder="メモ">${l.memo||""}</textarea>
      <input type="file" accept="image/*" onchange="uploadImg(${l.id},this)">
      ${l.img?`<img src="${l.img}" width="100%">`:""}
    `;

    list.appendChild(el);
  });
}

render();

</script>
</body>
</html>
