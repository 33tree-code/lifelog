<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeLog</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:-apple-system;}
.header{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #222;}
.btn{padding:10px;margin:5px;background:#111;border-radius:8px;}
.item{border-bottom:1px solid #333;padding:10px;}
input,textarea{width:100%;margin-top:5px;background:#111;color:#fff;border:1px solid #333;}
canvas{display:block;margin:10px auto;}
</style>
</head>

<body>

<div class="header">
  <span id="dateLabel"></span>
  <div>
    <button onclick="prevDay()">◀</button>
    <button onclick="nextDay()">▶</button>
    <button onclick="share()">共有</button>
    <button onclick="drawChart()">📊</button>
  </div>
</div>

<div>
  <button class="btn" onclick="startLog('仕事','💼')">💼仕事</button>
  <button class="btn" onclick="startLog('食事','🍽️')">🍽️食事</button>
</div>

<div id="list"></div>

<canvas id="chart" width="300" height="300"></canvas>

<script>

// ▼データ
let logs = JSON.parse(localStorage.getItem("logs") || "[]");
let currentDate = new Date();

// ▼保存
function save(){
  localStorage.setItem("logs", JSON.stringify(logs));
}

// ▼日付フォーマット
function formatJP(date){
  let d = new Date(date);
  let w = ["日","月","火","水","木","金","土"][d.getDay()];
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}(${w})`;
}

// ▼時間フォーマット
function formatTime(date){
  let d = new Date(date);
  return `${formatJP(date)} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

// ▼日付キー
function dateKey(d){
  return new Date(d).toISOString().slice(0,10);
}

// ▼所要時間
function duration(s,e){
  if(!e) return "";
  let m = Math.ceil((new Date(e)-new Date(s))/60000);
  let h = Math.floor(m/60);
  let mm = m%60;
  return h ? `${h}時間${mm}分` : `${mm}分`;
}

// ▼ログ開始
function startLog(title,icon){
  logs.unshift({
    id: Date.now(),
    title,
    icon,
    start: new Date().toISOString(),
    end: null,
    memo:""
  });
  save();
  render();
}

// ▼終了
function endLog(id){
  let l = logs.find(x=>x.id===id);
  l.end = new Date().toISOString();
  save();
  render();
}

// ▼日付移動
function prevDay(){
  currentDate.setDate(currentDate.getDate()-1);
  render();
}
function nextDay(){
  currentDate.setDate(currentDate.getDate()+1);
  render();
}

// ▼共有（Evernote用）
function share(){
  let title = formatJP(currentDate) + "のログ";
  let text = title + "\n\n";

  logs.filter(l=>dateKey(l.start)===dateKey(currentDate))
  .forEach(l=>{
    text += `${l.icon} ${l.title}\n`;
    text += `${formatTime(l.start)} ～ ${l.end ? formatTime(l.end):""}\n`;
    text += `${l.end ? "（"+duration(l.start,l.end)+"）":""}\n`;
    text += `${l.memo||""}\n\n`;
  });

  if(navigator.share){
    navigator.share({
      title: title,
      text: text
    });
  }else{
    prompt("コピーして使う", text);
  }
}

// ▼メモ
function saveMemo(id,val){
  let l = logs.find(x=>x.id===id);
  l.memo = val;
  save();
}

// ▼グラフ
function drawChart(){
  let ctx = document.getElementById("chart").getContext("2d");
  ctx.clearRect(0,0,300,300);

  let map = {};

  logs.filter(l=>l.end && dateKey(l.start)===dateKey(currentDate))
  .forEach(l=>{
    let m = Math.ceil((new Date(l.end)-new Date(l.start))/60000);
    map[l.title] = (map[l.title]||0)+m;
  });

  let total = Object.values(map).reduce((a,b)=>a+b,0);
  if(total===0) return;

  let colors = ["#ff6384","#36a2eb","#ffce56","#4bc0c0","#9966ff"];
  let start = 0;
  let i = 0;

  Object.keys(map).forEach(k=>{
    let val = map[k]/total * 2*Math.PI;

    ctx.beginPath();
    ctx.moveTo(150,150);
    ctx.arc(150,150,100,start,start+val);
    ctx.fillStyle = colors[i%colors.length];
    ctx.fill();

    start += val;
    i++;
  });
}

// ▼描画
function render(){
  document.getElementById("dateLabel").innerText = formatJP(currentDate);

  let list = document.getElementById("list");
  list.innerHTML = "";

  logs.filter(l=>dateKey(l.start)===dateKey(currentDate))
  .forEach(l=>{
    let el = document.createElement("div");
    el.className="item";

    el.innerHTML = `
      ${l.icon} ${l.title}<br>
      ${formatTime(l.start)} ～ ${l.end ? formatTime(l.end):""}<br>
      ${l.end ? "（"+duration(l.start,l.end)+"）":""}
      <br>
      <button onclick="endLog(${l.id})">終了</button>
      <textarea onchange="saveMemo(${l.id},this.value)" placeholder="メモ">${l.memo||""}</textarea>
    `;

    list.appendChild(el);
  });
}

render();

</script>

</body>
</html>
