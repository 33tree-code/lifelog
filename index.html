<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeLog</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:-apple-system;}
.header{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #222;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;}
.btn{background:#111;padding:10px;text-align:center;border-radius:10px;}
.item{padding:10px;border-bottom:1px solid #222;}
input,textarea{width:100%;margin-top:5px;background:#111;color:#fff;}
canvas{max-width:300px;margin:10px auto;display:block;}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);}
.day{padding:6px;text-align:center;background:#111;margin:2px;}
</style>
</head>

<body>

<div class="header">
  <span id="dateLabel"></span>
  <div>
    <button onclick="prevDay()">◀</button>
    <button onclick="nextDay()">▶</button>
    <button onclick="exportEvernote()">共有</button>
    <button onclick="openChart()">📊</button>
  </div>
</div>

<div class="grid" id="buttons"></div>
<div id="list"></div>

<canvas id="chart" width="300" height="300"></canvas>
<div id="calendar" class="calendar"></div>

<script>

// ▼データ
let logs=JSON.parse(localStorage.getItem("logs")||"[]");
let cats=JSON.parse(localStorage.getItem("cats")||'[{"name":"仕事","icon":"💼"},{"name":"食事","icon":"🍽️"}]');
let current=new Date();

// ▼保存
function save(){
 localStorage.setItem("logs",JSON.stringify(logs));
 localStorage.setItem("cats",JSON.stringify(cats));
}

// ▼日付
function fmtDate(d){
 let w=["日","月","火","水","木","金","土"][d.getDay()];
 return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}(${w})`;
}

// ▼時間
function duration(s,e){
 if(!e)return "";
 let m=Math.ceil((new Date(e)-new Date(s))/60000);
 let h=Math.floor(m/60);
 let mm=m%60;
 return h?`（${h}時間${mm}分）`:`（${mm}分）`;
}

// ▼ログ
function startLog(c){
 logs.unshift({id:Date.now(),title:c.name,icon:c.icon,startAt:new Date().toISOString(),endAt:null,memo:""});
 save();render();
}
function endLog(id){
 let l=logs.find(x=>x.id===id);
 l.endAt=new Date().toISOString();
 save();render();
}

// ▼日付移動
function prevDay(){current.setDate(current.getDate()-1);render();}
function nextDay(){current.setDate(current.getDate()+1);render();}

// ▼Evernote共有
function exportEvernote(){
 let text=fmtDate(current)+"のログ\n\n";
 logs.filter(l=>l.startAt.slice(0,10)===current.toISOString().slice(0,10))
 .forEach(l=>{
  text+=`${l.icon} ${l.title}\n${duration(l.startAt,l.endAt)}\n${l.memo||""}\n\n`;
 });

 prompt("コピーしてEvernoteへ",text);
}

// ▼グラフ（修正済）
function openChart(){
 let ctx=chart.getContext("2d");
 ctx.clearRect(0,0,300,300);

 let data={};
 logs.filter(l=>l.endAt).forEach(l=>{
  let m=Math.ceil((new Date(l.endAt)-new Date(l.startAt))/60000);
  data[l.title]=(data[l.title]||0)+m;
 });

 let total=Object.values(data).reduce((a,b)=>a+b,0);
 let start=0;

 Object.keys(data).forEach(k=>{
  let val=(data[k]/total)*2*Math.PI;
  ctx.beginPath();
  ctx.moveTo(150,150);
  ctx.arc(150,150,100,start,start+val);
  ctx.fillStyle="#"+Math.floor(Math.random()*16777215).toString(16);
  ctx.fill();
  start+=val;
 });
}

// ▼描画
function render(){
 dateLabel.innerText=fmtDate(current);

 // カテゴリ
 buttons.innerHTML="";
 cats.forEach(c=>{
  let el=document.createElement("div");
  el.className="btn";
  el.innerHTML=`${c.icon}<br>${c.name}`;
  el.onclick=()=>startLog(c);
  buttons.appendChild(el);
 });

 // ログ
 list.innerHTML="";
 logs.filter(l=>l.startAt.slice(0,10)===current.toISOString().slice(0,10))
 .forEach(l=>{
  let el=document.createElement("div");
  el.className="item";
  el.innerHTML=`
   ${l.icon} ${l.title}<br>
   ${duration(l.startAt,l.endAt)}
   <br><button onclick="endLog(${l.id})">終了</button>
   <textarea onchange="saveMemo(${l.id},this.value)">${l.memo||""}</textarea>
  `;
  list.appendChild(el);
 });
}

function saveMemo(id,val){
 let l=logs.find(x=>x.id===id);
 l.memo=val;save();
}

render();
</script>

</body>
</html>
