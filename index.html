<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeLog</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:-apple-system;}
.header{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #222;}
.btn{padding:10px;margin:5px;background:#111;border-radius:8px;}

<body>

<div class="header">
  <span id="dateLabel"></span>
  <div>
    <button onclick="prevDay()">◀</button>
    <button onclick="nextDay()">▶</button>
    <button onclick="share()">共有</button>
  </div>
</div>

<div id="buttons"></div>

<div style="padding:10px;">
  <button onclick="addCategory()">＋カテゴリ追加</button>
</div>

<div id="list"></div>

<script>

// ▼データ
let logs = JSON.parse(localStorage.getItem("logs") || "[]");
let cats = JSON.parse(localStorage.getItem("cats") || `[
  {"name":"仕事","icon":"💼"},
  {"name":"食事","icon":"🍽️"}
]`);

let currentDate = new Date();

// ▼保存
function save(){
  localStorage.setItem("logs", JSON.stringify(logs));
  localStorage.setItem("cats", JSON.stringify(cats));
}

// ▼日付
function formatJP(date){
  let d=new Date(date);
  let w=["日","月","火","水","木","金","土"][d.getDay()];
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}(${w})`;
}

// ▼時間
function formatHM(date){
  let d=new Date(date);
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
